<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proposition d'un week-end</title>

<style>

html {
    overflow: hidden;
}
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
	
	background-image: url("Image/Fond.jpg");
    background-size: cover;      /* Remplit tout l'écran */
    background-position: center; /* Centre l'image */
    background-repeat: no-repeat;

}

.card {
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
	width: 90%;
    max-width: 600px;
	box-sizing: border-box;
}

h1 {
    color: #d63384;
}

.buttons {
    display: flex;
    justify-content: space-around;  /* Les deux boutons espacés automatiquement */
    align-items: center;
    margin-top: 30px;
    height: 60px;
}

button {
    padding: 12px 30px;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    transition: 0.2s;
}

#yesBtn {
    position: static;  /* Plus de position absolute */
    background: #28a745;
    color: white;
}

#yesBtn:hover {
    transform: scale(1.05);
}

#noBtn {
    position: static;  /* Plus de position absolute */
    background: #dc3545;
    color: white;
    top: 0;
}
</style>
</head>

<body>

<div class="card">
    <h1>Proposition d'un week-end</h1>

    <p>
        Accepterais-tu de partir en week-end avec Olympe ?
	<br>
	<i> Et avec moi aussi 🥺</i>
    </p>

    <div class="buttons">
        <button id="yesBtn">✅ Oui</button>
        <button id="noBtn">❌ Non</button>
    </div>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const noBtn = document.getElementById("yesBtn");

const rect = yesBtn.getBoundingClientRect();
yesBtn.style.position = "fixed";
yesBtn.style.left = rect.left + "px";
yesBtn.style.top = rect.top + "px";
yesBtn.style.width = rect.width + "px";
yesBtn.style.height = rect.height + "px";


function moveButton() {

    noBtn.style.width = noBtn.offsetWidth + "px";
    noBtn.style.height = noBtn.offsetHeight + "px";
    const maxX = window.innerWidth - noBtn.offsetWidth - 20;
    const maxY = window.innerHeight - noBtn.offsetHeight - 20;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.position = "fixed";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("touchstart", moveButton);

document.addEventListener("touchmove", function(e) {
  const touch = e.touches[0];
  const elementUnder = document.elementFromPoint(touch.clientX, touch.clientY);
  if (elementUnder === noBtn || noBtn.contains(elementUnder)) {
    moveButton();
  }
}, { passive: true });

document.getElementById("yesBtn").addEventListener("click", () => {
    window.location.href = "https://docs.google.com/forms/d/e/1FAIpQLScIvFRL0gNQ8cxEc9EqeLFJr01l_ap1BWtgxUUYQCZ3mRsB5Q/viewform?usp=publish-editor";
});
</script>

</body>
</html>
